function Icon({name,size=24,className="",style={}}){
  const d=IP[name];
  if(!d)return <span className={`inline-flex items-center justify-center ${className}`} style={{width:size,height:size,...style}}/>;
  return(<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`inline-block ${className}`} style={style}><path d={d}/></svg>);
}

function FadeUp({children,delay=0,className=""}){
  const[v,setV]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setV(true),delay);return()=>clearTimeout(t)},[delay]);
  return <div className={`fade-up ${v?'visible':''} ${className}`}>{children}</div>;
}

/* ═══════════════════════════════════════════════════
   PROJECT M — FULL PSYCHOMETRIC ENGINE
   Best of 7: Pick 7 from 20, answer them, get result
   ═══════════════════════════════════════════════════ */
function ProjectM({setActiveTab}){
  // Steps: 0=theme pick, 1=scenario picker, 2=answering, 3=processing, 4=result
  const[phase,setPhase]=useState(0);
  const[selectedTheme,setSelectedTheme]=useState(null);
  const[pickedScenarios,setPickedScenarios]=useState([]);
  const[currentQ,setCurrentQ]=useState(0);
  const[answers,setAnswers]=useState([]);
  const[cardsVisible,setCardsVisible]=useState(false);
  const[selectedCard,setSelectedCard]=useState(null);

  const themeData=selectedTheme?THEMES[selectedTheme]:null;
  const activeScenarios=themeData?pickedScenarios.map(idx=>themeData.questions[idx]):[];
  const question=activeScenarios[currentQ]||null;

  useEffect(()=>{
    if(phase===2){setCardsVisible(false);setSelectedCard(null);const t=setTimeout(()=>setCardsVisible(true),800);return()=>clearTimeout(t);}
  },[phase,currentQ]);

  function pickTheme(key){setSelectedTheme(key);setPickedScenarios([]);setAnswers([]);setCurrentQ(0);setPhase(1);}

  function toggleScenario(idx){
    if(pickedScenarios.includes(idx)){setPickedScenarios(pickedScenarios.filter(i=>i!==idx));}
    else if(pickedScenarios.length<7){setPickedScenarios([...pickedScenarios,idx]);}
  }

  function randomPick(){
    const indices=Array.from({length:20},(_,i)=>i);
    for(let i=indices.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[indices[i],indices[j]]=[indices[j],indices[i]];}
    setPickedScenarios(indices.slice(0,7));
  }

  function startAnswering(){if(pickedScenarios.length===7){setCurrentQ(0);setAnswers([]);setPhase(2);}}

  function selectCard(trait,idx){
    setSelectedCard(idx);
    const newAnswers=[...answers,trait];
    setAnswers(newAnswers);
    setTimeout(()=>{
      if(currentQ<6){setCurrentQ(currentQ+1);setCardsVisible(false);setSelectedCard(null);setTimeout(()=>setCardsVisible(true),800);}
      else{setPhase(3);setTimeout(()=>setPhase(4),2500);}
    },600);
  }

  function getResult(){
    const freq={};answers.forEach(t=>{freq[t]=(freq[t]||0)+1;});
    let maxT=answers[0]||'optimizer',maxC=0;
    Object.entries(freq).forEach(([t,c])=>{if(c>maxC){maxC=c;maxT=t;}});
    return{archetype:ARCHETYPES[maxT]||ARCHETYPES.optimizer,freq,total:answers.length};
  }

  function reset(){setPhase(0);setSelectedTheme(null);setPickedScenarios([]);setAnswers([]);setCurrentQ(0);setCardsVisible(false);setSelectedCard(null);}

  // ── THEME SELECT ──
  if(phase===0){
    const themes=[
      {key:'ai_productivity',bg:'rgba(168,85,247,0.08)',border:'rgba(168,85,247,0.18)',txt:'text-purple-400'},
      {key:'responsible_leadership',bg:'rgba(245,158,11,0.08)',border:'rgba(245,158,11,0.18)',txt:'text-amber-400'},
      {key:'pediatric_screentime',bg:'rgba(34,211,238,0.08)',border:'rgba(34,211,238,0.18)',txt:'text-cyan-400'},
    ];
    return(
      <div className="min-h-screen pt-24 pb-16 px-6"><div className="max-w-4xl mx-auto">
        <FadeUp delay={100}><div className="text-center mb-4"><span className="text-purple-400/60 uppercase" style={{fontSize:'10px',letterSpacing:'0.3em'}}>Ontological Engine — Best of 7</span></div></FadeUp>
        <FadeUp delay={200}><h1 className="text-center text-4xl md:text-5xl font-bold tracking-tight text-white/95 mb-3">The Mind Matrix</h1></FadeUp>
        <FadeUp delay={300}><p className="text-center text-sm text-white/30 max-w-lg mx-auto mb-16 leading-relaxed">Choose a domain. Pick 7 scenarios from 20. Your decisions map to a psychometric archetype.</p></FadeUp>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
          {themes.map((th,i)=>(
            <FadeUp key={th.key} delay={500+i*150}>
              <button onClick={()=>pickTheme(th.key)} className="glass-card glass-hover rounded-2xl p-8 text-left w-full transition-all duration-500 group">
                <div className="w-12 h-12 rounded-xl flex items-center justify-center mb-5" style={{background:th.bg,border:`1px solid ${th.border}`}}>
                  <Icon name={THEMES[th.key].icon} size={20} className={th.txt}/>
                </div>
                <h3 className="text-sm font-semibold text-white/90 mb-1">{THEMES[th.key].title}</h3>
                <p className="text-xs text-white/30 leading-relaxed mb-1">{THEMES[th.key].subtitle}</p>
                <p className="text-xs text-white/20">20 scenarios · Best of 7</p>
                <div className="mt-5 flex items-center gap-2 text-xs text-white/20 group-hover:text-white/40 transition-all"><span>Select</span><Icon name="ArrowRight" size={12}/></div>
              </button>
            </FadeUp>
          ))}
        </div>
      </div></div>
    );
  }

  // ── SCENARIO PICKER ──
  if(phase===1){
    return(
      <div className="min-h-screen pt-24 pb-16 px-6"><div className="max-w-4xl mx-auto">
        <FadeUp delay={50}>
          <div className="flex items-center justify-between mb-8">
            <button onClick={reset} className="flex items-center gap-2 text-xs text-white/20 hover:text-white/40 transition-all"><Icon name="ArrowLeft" size={14}/>Back</button>
            <span className="text-white/20 uppercase" style={{fontSize:'10px',letterSpacing:'0.2em'}}>{themeData.title}</span>
            <div className="flex items-center gap-2">
              <span className="text-xs font-mono" style={{color:pickedScenarios.length===7?'rgba(52,211,153,0.8)':'rgba(255,255,255,0.3)'}}>{pickedScenarios.length}/7</span>
            </div>
          </div>
        </FadeUp>
        <FadeUp delay={150}>
          <div className="glass-card rounded-2xl p-6 mb-6">
            <div className="flex items-center justify-between mb-4">
              <div>
                <h2 className="text-lg font-semibold text-white/90 mb-1">Choose Your 7 Scenarios</h2>
                <p className="text-xs text-white/30">Tap to select scenarios, or shuffle for a random set.</p>
              </div>
              <button onClick={randomPick} className="flex items-center gap-2 px-4 py-2 rounded-lg text-xs font-medium transition-all" style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',color:'rgba(255,255,255,0.5)'}} onMouseOver={e=>{e.target.style.background='rgba(255,255,255,0.08)'}} onMouseOut={e=>{e.target.style.background='rgba(255,255,255,0.05)'}}>
                <Icon name="Shuffle" size={14}/>Shuffle 7
              </button>
            </div>
            <div className="space-y-2 max-h-[480px] overflow-y-auto pr-2">
              {themeData.questions.map((q,i)=>{
                const isPicked=pickedScenarios.includes(i);
                const num=isPicked?pickedScenarios.indexOf(i)+1:null;
                return(
                  <button key={i} onClick={()=>toggleScenario(i)}
                    className={`scenario-pill w-full text-left px-4 py-3 rounded-xl flex items-start gap-3 ${isPicked?'picked':''}`}
                    style={{border:'1px solid rgba(255,255,255,0.06)',background:isPicked?'rgba(168,85,247,0.1)':'rgba(255,255,255,0.02)'}}>
                    <div className="w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0 mt-0.5" style={{
                      background:isPicked?'rgba(168,85,247,0.2)':'rgba(255,255,255,0.04)',
                      border:`1px solid ${isPicked?'rgba(168,85,247,0.4)':'rgba(255,255,255,0.08)'}`,
                      color:isPicked?'rgba(216,180,254,0.9)':'rgba(255,255,255,0.25)',fontSize:'11px',fontWeight:600
                    }}>{isPicked?num:i+1}</div>
                    <p className="text-xs leading-relaxed" style={{color:isPicked?'rgba(216,180,254,0.8)':'rgba(255,255,255,0.4)'}}>{q.text}</p>
                  </button>
                );
              })}
            </div>
          </div>
        </FadeUp>
        <FadeUp delay={300}>
          <button onClick={startAnswering} disabled={pickedScenarios.length!==7}
            className="w-full py-4 rounded-xl text-sm font-medium transition-all duration-300 flex items-center justify-center gap-3"
            style={{
              background:pickedScenarios.length===7?'rgba(168,85,247,0.2)':'rgba(255,255,255,0.03)',
              border:`1px solid ${pickedScenarios.length===7?'rgba(168,85,247,0.4)':'rgba(255,255,255,0.06)'}`,
              color:pickedScenarios.length===7?'rgba(216,180,254,0.9)':'rgba(255,255,255,0.2)',
              cursor:pickedScenarios.length===7?'pointer':'not-allowed'
            }}>
            <Icon name="Play" size={16}/>Begin Assessment — {pickedScenarios.length===7?'7 Scenarios Ready':'Select '+( 7-pickedScenarios.length)+' More'}
          </button>
        </FadeUp>
      </div></div>
    );
  }

  // ── PROCESSING ──
  if(phase===3){
    return(
      <div className="min-h-screen pt-24 flex items-center justify-center">
        <div className="text-center">
          <div className="processing-ring mx-auto mb-8"/>
          <FadeUp delay={200}><p className="text-xs text-white/30 uppercase" style={{letterSpacing:'0.3em'}}>Mapping Cognitive Architecture</p></FadeUp>
          <FadeUp delay={600}><p className="text-white/15 mt-3" style={{fontSize:'10px'}}>Analyzing 7 decision vectors...</p></FadeUp>
        </div>
      </div>
    );
  }

  // ── RESULT ──
  if(phase===4){
    const{archetype,freq,total}=getResult();
    const sortedTraits=Object.entries(freq).sort((a,b)=>b[1]-a[1]);
    return(
      <div className="min-h-screen pt-24 pb-16 px-6"><div className="max-w-2xl mx-auto text-center">
        <FadeUp delay={200}><span className="text-purple-400/60 uppercase" style={{fontSize:'10px',letterSpacing:'0.3em'}}>Best of 7 — Analysis Complete</span></FadeUp>
        <FadeUp delay={400}>
          <div className="mt-10 mb-8">
            <div className="w-20 h-20 rounded-2xl glass-card glow-border mx-auto flex items-center justify-center mb-8"><Icon name="Fingerprint" size={32} className="text-purple-400"/></div>
            <h1 className="text-3xl md:text-4xl font-bold text-white/95 mb-4">{archetype.name}</h1>
            <p className="text-sm text-white/40 leading-relaxed max-w-md mx-auto">{archetype.desc}</p>
          </div>
        </FadeUp>
        <FadeUp delay={700}>
          <div className="glass-card rounded-2xl p-6 mb-6 text-left">
            <div className="flex items-center gap-3 mb-5"><Icon name="BarChart3" size={16} className="text-purple-400/60"/><span className="text-white/30 uppercase" style={{fontSize:'10px',letterSpacing:'0.2em'}}>Trait Distribution (7 answers)</span></div>
            <div className="space-y-3">
              {sortedTraits.map(([trait,count],i)=>{
                const pct=Math.round((count/total)*100);
                return(
                  <div key={trait}>
                    <div className="flex items-center justify-between mb-1">
                      <span className="text-xs text-white/50 font-medium">{ARCHETYPES[trait]?.name||trait}</span>
                      <span className="text-xs text-white/30 font-mono">{count}/7 ({pct}%)</span>
                    </div>
                    <div className="h-2 rounded-full overflow-hidden" style={{background:'rgba(255,255,255,0.03)'}}>
                      <div className="h-full rounded-full bar-animate" style={{width:`${pct}%`,background:'rgba(168,85,247,0.5)',transition:'width 1s ease'}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </FadeUp>
        <FadeUp delay={1000}>
          <div className="flex items-center justify-center gap-4 flex-wrap">

  // ── ANSWERING PHASE ──

      <FadeUp delay={100} key={`q-${currentQ}`}>
        <div className="glass-card rounded-2xl p-8 mb-8">

              <div className="flex items-center gap-3 mb-3">
                <span className="text-white/20 uppercase" style={{fontSize:'10px',letterSpacing:'0.2em'}}>Scenario {question.id}</span>
                <span className="px-2 py-0.5 rounded-full text-white/15" style={{fontSize:'9px',background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.05)'}}>Round {currentQ+1} of 7</span>
              </div>
              <p className="text-base text-white/80 leading-relaxed">{question.text}</p>
            </div>
          </div>
        </div>
      </FadeUp>

      <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
        {question.cards.map((card,i)=>(
          <div key={`${currentQ}-${i}`} className={`fade-up ${cardsVisible?'visible':''} ${i===0?'card-delayed-1':i===1?'card-delayed-2':'card-delayed-3'}`}>
            <button onClick={()=>selectedCard===null&&selectCard(card.trait,i)} disabled={selectedCard!==null}
              className={`tarot-card glass-card rounded-2xl p-6 text-left w-full flex flex-col ${selectedCard===i?'selected':''} ${selectedCard!==null&&selectedCard!==i?'opacity-30':''}`}>
              <div className="w-10 h-10 rounded-xl flex items-center justify-center mb-5" style={{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)'}}>
                <span className="text-white/40 font-bold" style={{fontSize:'14px'}}>{String.fromCharCode(65+i)}</span>
              </div>
              <h3 className="text-sm font-semibold text-white/90 mb-2">{card.title}</h3>
              <p className="text-xs text-white/40 leading-relaxed flex-1">{card.desc}</p>
            </button>
          </div>
        ))}
      </div>
    </div></div>
  );
}
